<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcTdfWV0FSiUF-mR97aqVj-Ozxy8sObHp2Mw&s);
                background-size: cover;
                background-position: absolute;
                background-repeat: no-repeat;
                
            }
            .Padre{
                width: 400px;
                height: 10px;
                position: absolute;
                background-color: brown;
                top:400px;
                animation: mover 1s ease-in-out;
                animation-fill-mode: forwards;
                animation-delay: 0s;
            }
            @keyframes mover {
                0%{transform: translateX(0px);}
                100%{transform: translate(200px);}
            }
                
            
            .hijo{
                background-color: red;
                border-radius: 100%;
                width: 50px;
                height: 50px;
                color:aliceblue;
                line-height: 50px;
                text-align: center;
                position: absolute;
                left: 600px;
                top: 380px;
                background: radial-gradient(circle at 30% 30%, #555, #000);
                 box-shadow: inset -10px -10px 20px #000, 10px 10px 20px #ccc;
                perspective: 1000px;
                 animation: girar 2s ease-in-out;
                 animation-delay: 1s;
                 animation-fill-mode: forwards;
            }
    

            @keyframes girar {
                0% { transform: rotate(0deg) translateX(0px) translateY(0px); }
                100% { transform:  translateX(350px) translateY(-150px); }
            }
            
        </style>
    </head>
    <body>
        <div class="Padre">
            
        </div>
        <div class="hijo">8</div>
    </body>
</html>
